services:
  ai-model:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-model-service
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./outputs:/app/outputs
    environment:
      - PORT=5000
      - PYTHONUNBUFFERED=1
      - WORKERS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-model-network

networks:
  ai-model-network:
    driver: bridge


