name: Train and Deploy AI Model

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'

jobs:
  train:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create data directory
      run: |
        mkdir -p data
        python train.py --data_path data/train.csv || echo "Training completed"
    
    - name: Train model
      run: |
        python train.py \
          --data_path data/train.csv \
          --num_epochs 3 \
          --batch_size 16 \
          --model_dir models
    
    - name: Upload model artifacts
      uses: actions/upload-artifact@v3
      with:
        name: model-artifacts
        path: |
          models/*.pt
          outputs/*.json
        retention-days: 30
    
    - name: Get model version
      id: model_version
      run: |
        MODEL_FILE=$(ls -t models/*.pt 2>/dev/null | head -1 || echo "")
        if [ -n "$MODEL_FILE" ]; then
          VERSION=$(basename "$MODEL_FILE" .pt | sed 's/model_v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Model version: $VERSION"
        else
          echo "version=latest" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.model_version.outputs.version }}
        name: Model v${{ steps.model_version.outputs.version }}
        files: |
          models/*.pt
          outputs/*.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v --cov=. --cov-report=xml || echo "No tests found"
    
    - name: Test model loading
      run: |
        python -c "from model import ModelManager; print('Model imports successfully')"

  build:
    needs: [train, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download model artifacts
      uses: actions/download-artifact@v3
      with:
        name: model-artifacts
        path: models/
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      if: github.event_name != 'schedule'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'schedule' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/ai-model:latest
          ${{ secrets.DOCKER_USERNAME }}/ai-model:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ai-model:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ai-model:buildcache,mode=max

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to self-hosted server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/ai-model
          docker-compose pull
          docker-compose up -d
          docker-compose logs --tail=50

